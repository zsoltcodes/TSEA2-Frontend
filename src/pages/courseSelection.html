<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeNest - Courses</title>
    <link rel="icon" href="../../../public/favicon_CN.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/courseSelection.css">
</head>
<body data-page="courses">
    <header id="header"></header>

    <section class="search-bar-container">
        <div class="search-bar-subcontainer">
            <input class="search-bar" type="search" placeholder="Search for courses!">
            <img src="../../public/search.png" width="20px">
        </div>
    </section>
    <section class="courses-container">
        <div class="section-title">
            <span class="title">Top Courses</span>
        </div>
        <!-- ### JavaScript Card ### -->
        <div class="course-list">
            <div class="card js-card">
                <span class="card-title js-title">JavaScript</span>
                <div class="sub-infos">
                    <div class="duration">
                        <img src="../../public/clock.png" width="45px">
                        <span class="main-text">Duration: <span class="sub-text">5 hours</span></span>
                    </div>
                    <div class="difficulty">
                        <img src="../../public/newbie.png" width="45px">
                        <span class="main-text"><span class="sub-text">Beginner</span> friendly</span>
                    </div>
                    <div class="skills-gained">
                        <div class="box-head">
                            <img src="../../public/skill-development.png" width="45px">
                            <span class="main-text"><span class="sub-text">Skills</span> Gained</span>
                        </div>
                        <div class="skills-list">

                        </div>
                    </div>
                </div>
                <div class="link-to-course">
                    <span class="main-text">Take me to the course!</span>
                    <img src="../../public/external-link.png" width="35px">
                </div>
            </div>
            <!-- ### Python Card ### -->
            <div class="card py-card">
                <span class="card-title py-title">Python</span>
                <div class="sub-infos">
                    <div class="duration">
                        <img src="../../public/clock.png" width="45px">
                        <span class="main-text">Duration: <span class="sub-text">5 hours</span></span>
                    </div>
                    <div class="difficulty">
                        <img src="../../public/newbie.png" width="45px">
                        <span class="main-text"><span class="sub-text">Beginner</span> friendly</span>
                    </div>
                    <div class="skills-gained">
                        <div class="box-head">
                            <img src="../../public/skill-development.png" width="45px">
                            <span class="main-text"><span class="sub-text">Skills</span> Gained</span>
                        </div>
                        <div class="skills-list">

                        </div>
                    </div>
                </div>
                <div class="link-to-course">
                    <span class="main-text">Take me to the course!</span>
                    <img src="../../public/external-link.png" width="35px">
                </div>
            </div>
            <!-- ### C++ Card ### -->
            <div class="card cpp-card">
                <span class="card-title cpp-title">C++</span>
                <div class="sub-infos">
                    <div class="duration">
                        <img src="../../public/clock.png" width="45px">
                        <span class="main-text">Duration: <span class="sub-text">5 hours</span></span>
                    </div>
                    <div class="difficulty">
                        <img src="../../public/newbie.png" width="45px">
                        <span class="main-text"><span class="sub-text">Beginner</span> friendly</span>
                    </div>
                    <div class="skills-gained">
                        <div class="box-head">
                            <img src="../../public/skill-development.png" width="45px">
                            <span class="main-text"><span class="sub-text">Skills</span> Gained</span>
                        </div>
                        <div class="skills-list">

                        </div>
                    </div>
                </div>
                <div class="link-to-course">
                    <span class="main-text">Take me to the course!</span>
                    <img src="../../public/external-link.png" width="35px">
                </div>
            </div>
        </div>
    </section>

    <footer id="footer"></footer>
    <script src="../js/loadComponents.js"></script>
</body>
</html>
